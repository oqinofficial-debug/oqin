<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Keuangan" />
  <title>Keuangan Keluarga</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1>💰 Keuangan Keluarga</h1>
    <span id="tgl-header"></span>
  </header>

  <!-- ===== HALAMAN DASHBOARD ===== -->
  <div id="hal-dashboard" class="halaman">

    <h2>Ringkasan Bulan Ini</h2>
    <div id="ringkasan">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <h2>Rincian Pemasukan</h2>
    <div id="kat-masuk" class="rincian-wrap">
      <div class="skeleton"></div>
    </div>

    <h2>Rincian Pengeluaran</h2>
    <div id="kat-keluar" class="rincian-wrap">
      <div class="skeleton"></div>
    </div>

  </div>

  <!-- ===== HALAMAN INPUT TRANSAKSI ===== -->
  <div id="hal-input" class="halaman">

    <h2>Tipe Transaksi</h2>
    <div class="form-grup">
      <input type="hidden" id="inp-tipe" value="keluar" />
      <div class="tipe-toggle">
        <button type="button" id="btn-tipe-keluar" class="aktif-keluar">➖ Pengeluaran</button>
        <button type="button" id="btn-tipe-masuk">➕ Pemasukan</button>
      </div>
    </div>

    <h2>Kategori</h2>
    <div class="form-grup">
      <select id="inp-kategori">
        <option>Memuat...</option>
      </select>
      <div id="kategori-baru-wrap" class="kategori-baru-wrap">
        <input type="text" id="inp-kategori-baru" placeholder="Nama kategori baru (contoh: BENSIN)" autocapitalize="characters" />
      </div>
    </div>

    <h2>Nominal</h2>
    <div class="form-grup">
      <!-- FIX: inputmode="text" agar bisa ketik k/jt, konsisten dengan parseNominal() -->
      <input type="text" id="inp-nominal" placeholder="Contoh: 50000 atau 50k atau 1.5jt" inputmode="text" autocomplete="off" />
      <span class="input-hint">Bisa tulis: 50000 · 50k · 1.5jt · 1,500,000</span>
    </div>

    <h2>Keterangan <span class="label-opsional">(opsional)</span></h2>
    <div class="form-grup">
      <input type="text" id="inp-keterangan" placeholder="Contoh: makan siang, bensin NMAX" autocomplete="off" />
    </div>

    <button class="btn-simpan" id="btn-simpan">💾 Simpan Transaksi</button>

  </div>

  <!-- ===== HALAMAN RIWAYAT ===== -->
  <div id="hal-riwayat" class="halaman">

    <h2>30 Transaksi Terbaru
      <button id="btn-refresh-riwayat" class="btn-refresh">↻ Refresh</button>
    </h2>
    <div id="list-riwayat">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

  </div>

  <!-- ===== NAVIGASI BAWAH ===== -->
  <nav class="nav-bawah">
    <button class="nav-tab" data-hal="dashboard">
      <span class="nav-ikon">📊</span>
      Dashboard
    </button>
    <button class="nav-tab" data-hal="input">
      <span class="nav-ikon">➕</span>
      Catat
    </button>
    <button class="nav-tab" data-hal="riwayat">
      <span class="nav-ikon">📋</span>
      Riwayat
    </button>
  </nav>

  <!-- LOADING OVERLAY -->
  <div id="loading">
    <div class="spinner"></div>
  </div>

  <!-- TOAST NOTIFIKASI -->
  <div id="toast" class="toast"></div>

  <!-- DIALOG KONFIRMASI CUSTOM -->
  <div id="konfirmasi-overlay" class="konfirmasi-overlay">
    <div class="konfirmasi-box">
      <p id="konfirmasi-teks" class="konfirmasi-teks"></p>
      <div class="konfirmasi-aksi">
        <button id="konfirmasi-tidak" class="btn-konfirmasi-batal">Batal</button>
        <button id="konfirmasi-ya" class="btn-konfirmasi-hapus">Hapus</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>

</body>
</html>
