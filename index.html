<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <!-- PERBAIKAN BUG #9: Tambah apple-touch-icon -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Keuangan" />
  <title>Keuangan Keluarga</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1>💰 Keuangan Keluarga</h1>
    <span id="tgl-header"></span>
  </header>

  <!-- PERBAIKAN BUG #10: Gunakan <div> untuk halaman, bukan duplikat <main> -->

  <!-- ===== HALAMAN DASHBOARD ===== -->
  <div id="hal-dashboard" class="halaman">

    <h2>Ringkasan Bulan Ini</h2>
    <div id="ringkasan">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <h2>Rincian Pemasukan</h2>
    <div id="kat-masuk" class="rincian-wrap">
      <div class="skeleton"></div>
    </div>

    <h2>Rincian Pengeluaran</h2>
    <div id="kat-keluar" class="rincian-wrap">
      <div class="skeleton"></div>
    </div>

  </div>

  <!-- ===== HALAMAN INPUT TRANSAKSI ===== -->
  <div id="hal-input" class="halaman">

    <!-- PERBAIKAN BUG #8: Pakai tombol toggle sesuai desain CSS yang sudah ada -->
    <h2>Tipe Transaksi</h2>
    <div class="form-grup">
      <!-- Hidden input menyimpan nilai aktual -->
      <input type="hidden" id="inp-tipe" value="keluar" />
      <div class="tipe-toggle">
        <button type="button" id="btn-tipe-keluar" class="aktif-keluar">➖ Pengeluaran</button>
        <button type="button" id="btn-tipe-masuk">➕ Pemasukan</button>
      </div>
    </div>

    <h2>Kategori</h2>
    <div class="form-grup">
      <select id="inp-kategori">
        <option>Memuat...</option>
      </select>
      <div id="kategori-baru-wrap" style="display:none; margin-top:8px;">
        <input type="text" id="inp-kategori-baru" placeholder="Nama kategori baru (contoh: BENSIN)" autocapitalize="characters" />
      </div>
    </div>

    <h2>Nominal</h2>
    <div class="form-grup">
      <input type="text" id="inp-nominal" placeholder="Contoh: 50000 atau 50k atau 1.5jt" inputmode="decimal" autocomplete="off" />
    </div>

    <h2>Keterangan <span style="color:var(--text-muted); font-size:11px;">(opsional)</span></h2>
    <div class="form-grup">
      <input type="text" id="inp-keterangan" placeholder="Contoh: makan siang, bensin NMAX" autocomplete="off" />
    </div>

    <button class="btn-simpan" id="btn-simpan">💾 Simpan Transaksi</button>

  </div>

  <!-- ===== HALAMAN RIWAYAT ===== -->
  <div id="hal-riwayat" class="halaman">

    <h2>30 Transaksi Terbaru
      <button id="btn-refresh-riwayat" style="float:right; background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer; font-weight:600;">↻ Refresh</button>
    </h2>
    <div id="list-riwayat">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

  </div>

  <!-- ===== NAVIGASI BAWAH ===== -->
  <nav class="nav-bawah">
    <button class="nav-tab" data-hal="dashboard">
      <span class="nav-ikon">📊</span>
      Dashboard
    </button>
    <button class="nav-tab" data-hal="input">
      <span class="nav-ikon">➕</span>
      Catat
    </button>
    <button class="nav-tab" data-hal="riwayat">
      <span class="nav-ikon">📋</span>
      Riwayat
    </button>
  </nav>

  <!-- LOADING OVERLAY -->
  <div id="loading">
    <div class="spinner"></div>
  </div>

  <!-- TOAST NOTIFIKASI -->
  <div id="toast" class="toast"></div>

  <!-- PERBAIKAN BUG #4: Dialog konfirmasi custom (pengganti confirm() native) -->
  <div id="konfirmasi-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.85); z-index:200; justify-content:center; align-items:center;">
    <div style="background:var(--surface); border-radius:16px; padding:24px 20px; width:calc(100% - 48px); max-width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <p id="konfirmasi-teks" style="font-size:15px; line-height:1.5; margin-bottom:20px; text-align:center; white-space:pre-line;"></p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button id="konfirmasi-tidak" style="padding:12px; border-radius:10px; border:1px solid var(--surface2); background:var(--surface2); color:var(--text); font-size:14px; font-weight:600; cursor:pointer;">Batal</button>
        <button id="konfirmasi-ya" style="padding:12px; border-radius:10px; border:none; background:var(--red-bg); color:var(--red); font-size:14px; font-weight:700; cursor:pointer;">Hapus</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>

</body>
</html>
